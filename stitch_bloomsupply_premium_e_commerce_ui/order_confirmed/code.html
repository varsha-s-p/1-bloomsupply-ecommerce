<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BloomSupply - Order Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "surface": "#fcf9f8",
                        "tertiary": "#41423f",
                        "tertiary-fixed": "#e4e2de",
                        "outline": "#737872",
                        "on-primary-fixed": "#0e1f13",
                        "on-tertiary-fixed": "#1b1c1a",
                        "outline-variant": "#c3c8c1",
                        "tertiary-container": "#595956",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1c1b1b",
                        "tertiary-fixed-dim": "#c8c6c3",
                        "inverse-surface": "#313030",
                        "primary-container": "#4a5d4e",
                        "on-secondary-fixed": "#32120e",
                        "on-tertiary-fixed-variant": "#474744",
                        "primary-fixed-dim": "#b7ccb9",
                        "surface-dim": "#dcd9d9",
                        "on-background": "#1c1b1b",
                        "primary-fixed": "#d3e8d5",
                        "surface-variant": "#e5e2e1",
                        "surface-container": "#f0eded",
                        "on-secondary-fixed-variant": "#653c36",
                        "surface-tint": "#506354",
                        "secondary-container": "#ffc3bb",
                        "on-secondary": "#ffffff",
                        "primary": "#334537",
                        "on-primary-fixed-variant": "#394b3d",
                        "on-primary": "#ffffff",
                        "surface-bright": "#fcf9f8",
                        "inverse-primary": "#b7ccb9",
                        "secondary": "#80534c",
                        "inverse-on-surface": "#f3f0ef",
                        "secondary-fixed": "#ffdad5",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#f3b8b0",
                        "on-surface-variant": "#434843",
                        "on-error": "#ffffff",
                        "on-primary-container": "#c0d5c2",
                        "surface-container-low": "#f6f3f2",
                        "surface-container-highest": "#e5e2e1",
                        "on-tertiary-container": "#d1d0cc",
                        "background": "#fcf9f8",
                        "on-secondary-container": "#7b4e48",
                        "surface-container-high": "#eae7e7",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "xxl": "80px",
                        "xl": "40px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "unit": "4px",
                        "container-max": "1280px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "h2": ["Noto Serif"],
                        "button": ["Inter"],
                        "h1": ["Noto Serif"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "h3": ["Noto Serif"]
                    },
                    "fontSize": {
                        "h2": ["36px", { "lineHeight": "1.3", "fontWeight": "400" }],
                        "button": ["14px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "h1": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "400" }],

                        "h3": ["24px", { "lineHeight": "1.4", "fontWeight": "400" }]

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md antialiased">
<!-- Transactional Page - No TopNavBar or BottomNavBar -->
<main class="flex-grow flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Decorative Background Element -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-fixed rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary-container rounded-full blur-[100px]"></div>
</div>
<div class="relative z-10 max-w-lg w-full flex flex-col items-center text-center">
<!-- Success Icon -->
<div class="w-24 h-24 rounded-full bg-primary-fixed/30 border border-primary-fixed flex items-center justify-center mb-xl shadow-[0_8px_32px_rgba(74,93,78,0.08)]">
<span class="material-symbols-outlined text-5xl text-primary" style="font-variation-settings: 'FILL' 1;">
                    check_circle
                </span>
</div>
<!-- Typography -->
<h1 class="font-h1 text-h1 text-on-surface mb-sm">Order Placed</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-xl max-w-md mx-auto">
                Thank you for your order. We are preparing your curated blooms with care.
            </p>
<!-- Order Details Card -->
<div class="w-full bg-surface-container-lowest rounded-xl border border-surface-variant p-lg shadow-[0_4px_24px_rgba(74,93,78,0.04)] mb-xl">
<div class="flex justify-between items-center pb-md border-b border-surface-variant mb-md">
<span class="font-body-md text-body-md text-on-surface-variant">Order Number</span>
<span class="font-body-md text-body-md text-on-surface font-medium">#BS-2948-FL</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Estimated Delivery</span>
<span class="font-body-md text-body-md text-on-surface font-medium">Thursday, Oct 26</span>
</div>
</div>
<!-- CTAs -->
<div class="flex flex-col sm:flex-row gap-md w-full justify-center">
<button class="bg-primary text-on-primary font-button text-button py-4 px-8 rounded-lg hover:bg-on-primary-fixed-variant transition-colors shadow-[0_4px_12px_rgba(74,93,78,0.1)]">
                    Track Order
                </button>
<button class="bg-transparent border border-outline text-on-surface font-button text-button py-4 px-8 rounded-lg hover:bg-surface-container transition-colors">
                    Continue Shopping
                </button>
</div>
</div>
</main>
<!-- Footer - Excluded to keep it minimal as requested, or simplified -->
<footer class="w-full py-lg px-gutter border-t border-surface-variant bg-surface flex justify-center mt-auto z-10 relative">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">BloomSupply Atelier</span>
</footer>
</body></html>
