<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Decorative subtle background element to anchor the "Curated Nature" theme without distraction -->
<div class="absolute inset-0 z-0 opacity-[0.03] pointer-events-none" data-alt="abstract close-up of overlapping monstera leaves creating gentle curved lines and soft shadows in monochrome" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAxZOGf_K2e2rWdY2ysUZLWBPXzh7lZBEHu6rvH1YiPXV_X3JntzOQQ050oLm5gtA2PD_DEjQSIDJ7XoWNkGFmekwI8j--rkhhdsrCvEnK8lSo1Xpp4SOrqhcJyUZ5HtbAFfB27EKHGGk5L3w8PJNniSk6P_94dmzVVmiLF5HRSlqOHfJDHn95hLujO7X7cCgtrpSxjMqvZIFZ5rjJOJ8RfYUOTLMvpVPvb-cZk2W2XawAOutB6N4v9bPHZVaDXWh0QJVHdGTseww'); background-size: cover; background-position: center;">
</div>
<!-- Centered Card Layout -->
<main class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl border border-outline-variant/40 ambient-shadow relative z-10 overflow-hidden flex flex-col">
<!-- Subtle Top Accent Line -->
<div class="h-1 w-full bg-primary-container"></div>
<div class="p-xl flex flex-col gap-lg">
<!-- Brand & Header -->
<div class="flex flex-col items-center text-center gap-sm">
<span class="font-h3 text-h3 italic text-primary tracking-wide">BloomSupply</span>
<h1 class="font-h2 text-h2 text-on-surface mt-sm">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your details to access your atelier.</p>
</div>
<!-- Segmented Toggle -->
<div class="flex p-unit bg-surface-container-low rounded-lg border border-outline-variant/20 mt-sm">
<button class="flex-1 py-sm px-md rounded bg-surface-container-lowest shadow-[0_1px_3px_rgba(0,0,0,0.05)] font-button text-button text-on-surface transition-all">
                    Sign In
                </button>
<button class="flex-1 py-sm px-md rounded font-button text-button text-on-surface-variant hover:text-on-surface transition-all">
                    Create Account
                </button>
</div>
<!-- Form -->
<form class="flex flex-col gap-md mt-sm">
<!-- Email Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-xs" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/60 rounded-lg py-[14px] pl-[48px] pr-md font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-end ml-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-button text-button text-secondary hover:text-primary transition-colors underline decoration-secondary/30 underline-offset-4" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/60 rounded-lg py-[14px] pl-[48px] pr-md font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md text-outline hover:text-on-surface transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary font-button text-button py-[16px] px-[32px] rounded-xl hover:bg-on-primary-fixed-variant transition-colors mt-md flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
</div>
</main>
</body></html>
